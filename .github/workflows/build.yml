name: Build Angr CTF Binaries

on:
  push:
    tags:
      - 'v*'  # 当您打出类似于 'v1.0' 的标签时，会自动触发Release发布
    branches:
      - master
      - main
  pull_request:

jobs:
  build:
    name: Build Cross-Platform Targets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc mingw-w64 gcc-aarch64-linux-gnu libc6-dev-arm64-cross zip
          python -m pip install jinja2
          
      - name: Build All Targets
        run: |
          python build.py --targets windows linux android \
              --windows-cc x86_64-w64-mingw32-gcc \
              --linux-cc gcc \
              --android-cc aarch64-linux-gnu-gcc
              
      # 将三个平台的产物分别打包成 ZIP
      - name: Archive Binaries
        run: |
          cd dist
          zip -r windows-binaries.zip windows/
          zip -r linux-binaries.zip linux/
          zip -r android-binaries.zip android/
          
      # 上传作为 Action Artifacts 备用（即使不是 Tag 触发也能在这个界面下载）
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: all-compiled-binaries
          path: |
            dist/*.zip
            
      # 发布到 Github Releases (仅在 Tag 出发时才激活)
      - name: Setup Github Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/windows-binaries.zip
            dist/linux-binaries.zip
            dist/android-binaries.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
